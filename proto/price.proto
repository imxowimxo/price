syntax = "proto3";

package price;
option go_package = "./gen;Price"; 


service PriceService{

  rpc AddUser(CreateUser) returns(NewUser);

  rpc AddProduct(CreateProductRequest)returns(CreateProductResponse);

  rpc Delete(DeleteProductRequest) returns(DeleteProductResponse);

  rpc Get(GetProductRequest)returns(Product);

  rpc GetUserProducts(GetUser)returns(ProductListResponse);

  rpc UpdateTargetPrice(UpdateRequest)returns(UpdateResponse);
}


message CreateUser{
  int64 user_id = 1;
  string user_name = 2;
}

message NewUser{
  int64 user_id = 1;
  string user_name = 2;
}


message CreateProductRequest{
  int64 user_id = 1;
  string name = 2;
  string url = 3;
  double target_price = 4;
}

message CreateProductResponse{
  int64 product_id = 1;
}

message Product{
  string name = 1;
  string url = 2;
  double target_price = 3;
  double current_price = 4;
  int64  product_id = 5;
}

message GetProductRequest{
  int64 product_id = 1;
  int64 user_id = 2;
}

message DeleteProductRequest{
  int64 product_id = 1;
  int64 user_id = 2;
}

message DeleteProductResponse{
  string status = 1;
}

message GetUser{
  int64 user_id = 1;
}

message ProductListResponse{
  repeated Product products = 1;
}

message UpdateRequest{
  int64 user_id = 1;
  int64 product_id = 2;
  double target_price = 3;
}
message UpdateResponse{
  string status = 1;
}